<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N-Tab</title>
    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/bootstrap-switch.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.min.css">
    <link rel="stylesheet" href="css/workbench.css">
    <script src="js/jquery-3.0.0.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/bootstrap-switch.min.js"></script>
    <script src="js/prefixfree.min.js"></script>
    <script src="js/Sortable.min.js"></script>
    <script type="text/javascript" src="js/hm.js"></script>
</head>

<body>
    <div>
        <nav class="navbar navbar-default navbar-fixed-top">
        <!--菜单-->
        </nav>
    </div>
    <div id = "top">
    <!--回到顶部锚点-->
    </div>
    <div class="container theme-showcase" role="main" id="body" style="padding-top: 65px;">
    <!--内容主体-->
    <div class="row">
        <!-- 左侧分类边栏 -->
        <div class="col-md-2" id="sidebar">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">分类</h3>
                </div>
                <div class="panel-body">
                    <div id="categoryList">
                        <!-- 分类列表将在这里动态渲染 -->
                    </div>
                    <div class="input-group" style="margin-top: 10px;">
                        <input type="text" class="form-control" id="newCategoryInput" placeholder="新分类名称">
                        <span class="input-group-btn">
                            <button class="btn btn-default" id="addCategoryBtn" type="button">添加</button>
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 右侧内容区域 -->
        <div class="col-md-10" id="content">
            <!-- 原有内容将在这里显示 -->
        </div>
    </div>
    </div>
    <script src="js/mithril.min.js"></script>
    <script src="js/moment.min.js"></script>
    <script src="js/workbench.js"></script>
</body>

</html>
